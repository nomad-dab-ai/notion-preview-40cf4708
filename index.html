<script src="https://cdn.tailwindcss.com"></script>
<style>
:root {
  --bg: #fdfaf6;
  --bg-alt: #f6efe6;
  --ink: #2d2620;
  --muted: #7a6e62;
  --accent: #e8a87c;
  --accent-deep: #c97a4f;
  --line: #ebe2d4;
  --card: #ffffff;
  --radius: 16px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { font-family: 'Pretendard', 'Noto Sans KR', system-ui, -apple-system, sans-serif; color: var(--ink); background: var(--bg); line-height: 1.6; -webkit-font-smoothing: antialiased; }
a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; border: none; background: none; color: inherit; }
img { max-width: 100%; display: block; }
.app { min-height: 100vh; display: flex; flex-direction: column; }
main { flex: 1; }

.nav { position: sticky; top: 0; z-index: 30; background: rgba(253,250,246,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); }
.nav-inner { max-width: 1100px; margin: 0 auto; padding: 16px 24px; display: flex; align-items: center; gap: 32px; }
.nav-logo { font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
.nav-links { display: flex; gap: 24px; flex: 1; }
.nav-links a { color: var(--muted); font-size: 15px; transition: color .2s; }
.nav-links a:hover, .nav-links a.is-active { color: var(--ink); }
.nav-cta { background: var(--accent); color: #fff; padding: 10px 20px; border-radius: 999px; font-weight: 600; font-size: 14px; transition: background .2s; }
.nav-cta:hover { background: var(--accent-deep); }

.hero { padding: 100px 24px; }
.hero-inner { max-width: 880px; margin: 0 auto; text-align: center; }
.hero-eyebrow { color: var(--accent-deep); font-size: 13px; font-weight: 600; letter-spacing: 0.18em; margin-bottom: 20px; }
.hero-title { font-size: 56px; font-weight: 800; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 24px; }
.hero-desc { font-size: 17px; color: var(--muted); margin-bottom: 36px; }
.hero-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

.btn { display: inline-flex; align-items: center; justify-content: center; padding: 12px 24px; border-radius: 999px; font-weight: 600; font-size: 15px; transition: all .2s; border: 1px solid transparent; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent-deep); }
.btn-ghost { background: transparent; color: var(--ink); border-color: var(--line); }
.btn-ghost:hover { border-color: var(--ink); }
.btn-lg { padding: 16px 32px; font-size: 16px; }

.section { padding: 100px 24px; }
.section-alt { background: var(--bg-alt); }
.section-inner { max-width: 1100px; margin: 0 auto; }
.section-narrow { max-width: 760px; margin: 0 auto; }
.section-head { text-align: center; margin-bottom: 48px; }
.section-title { font-size: 36px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; }
.section-sub { color: var(--muted); font-size: 16px; }
.section-foot { text-align: center; margin-top: 36px; }
.link-more { color: var(--accent-deep); font-weight: 600; font-size: 15px; }
.link-more:hover { text-decoration: underline; }
.state-msg { text-align: center; padding: 60px 20px; color: var(--muted); }
.state-msg.error { color: #c54040; }

.class-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.class-card { background: var(--card); border-radius: var(--radius); overflow: hidden; border: 1px solid var(--line); transition: transform .2s, box-shadow .2s; display: flex; flex-direction: column; }
.class-card:hover { transform: translateY(-4px); box-shadow: 0 14px 30px rgba(58,40,24,0.08); }
.class-card.is-closed { opacity: 0.65; }
.class-thumb { position: relative; aspect-ratio: 4/3; background: var(--bg-alt); overflow: hidden; }
.class-thumb img { width: 100%; height: 100%; object-fit: cover; }
.class-thumb-placeholder { display: flex; align-items: center; justify-content: center; height: 100%; font-size: 40px; opacity: 0.3; }
.class-badge { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.92); padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
.class-badge.is-closed { background: rgba(45,38,32,0.85); color: #fff; }
.class-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
.class-title { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
.class-desc { color: var(--muted); font-size: 14px; margin-bottom: 16px; min-height: 42px; }
.class-meta { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; padding: 12px; background: var(--bg-alt); border-radius: 10px; }
.class-meta div { font-size: 12px; }
.class-meta dt { color: var(--muted); margin-bottom: 4px; }
.class-meta dd { color: var(--ink); font-weight: 600; }
.class-link { color: var(--accent-deep); font-weight: 600; font-size: 14px; margin-top: auto; }
.class-link:hover { text-decoration: underline; }

.review-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
.review-card { background: var(--card); border-radius: var(--radius); padding: 28px; border: 1px solid var(--line); }
.stars { display: inline-flex; gap: 2px; margin-bottom: 14px; }
.star { color: var(--line); font-size: 18px; }
.star.on { color: #e8a23a; }
.review-body { color: var(--ink); font-size: 15px; margin-bottom: 20px; line-height: 1.7; }
.review-meta { display: flex; justify-content: space-between; font-size: 13px; }
.review-author { font-weight: 600; }
.review-class { color: var(--muted); }

.faq-list { list-style: none; border-top: 1px solid var(--line); }
.faq-item { border-bottom: 1px solid var(--line); }
.faq-q { width: 100%; padding: 20px 0; display: flex; gap: 16px; align-items: center; text-align: left; }
.faq-q-cat { background: var(--bg-alt); color: var(--accent-deep); padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; flex-shrink: 0; }
.faq-q-text { flex: 1; font-weight: 600; font-size: 16px; }
.faq-q-icon { color: var(--muted); font-size: 22px; line-height: 1; width: 22px; text-align: center; }
.faq-a { padding: 0 0 24px 0; color: var(--muted); font-size: 15px; line-height: 1.7; }

.cta { background: var(--accent); color: #fff; padding: 80px 24px; }
.cta-inner { max-width: 800px; margin: 0 auto; text-align: center; }
.cta-title { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 12px; line-height: 1.3; }
.cta-desc { opacity: 0.95; margin-bottom: 28px; }
.cta .btn-primary { background: #fff; color: var(--accent-deep); }
.cta .btn-primary:hover { background: #fef3e8; }

.footer { background: var(--ink); color: #d8cfc2; padding: 48px 24px; }
.footer-inner { max-width: 1100px; margin: 0 auto; text-align: center; }
.footer-brand { font-weight: 700; color: #fff; margin-bottom: 8px; font-size: 16px; }
.footer-meta { font-size: 14px; margin-bottom: 16px; opacity: 0.85; }
.footer-copy { font-size: 13px; opacity: 0.6; }

@media (max-width: 768px) {
  .nav-inner { gap: 12px; padding: 12px 16px; }
  .nav-links { gap: 12px; font-size: 14px; }
  .hero { padding: 60px 16px; }
  .hero-title { font-size: 36px; }
  .hero-desc { font-size: 15px; }
  .section { padding: 64px 16px; }
  .section-title { font-size: 26px; }
  .class-grid, .review-grid { grid-template-columns: 1fr; }
  .cta { padding: 56px 16px; }
  .cta-title { font-size: 24px; }
}
</style>

le = items.slice(0, 3);\n\n  function handleToggle(id) {\n    setOpenId(prev => (prev === id ? null : id));\n  }\n\n  return (\n    <section className=\"section\">\n      <div className=\"section-narrow\">\n        <header className=\"section-head\">\n          <h2 className=\"section-title\">자주 묻는 질문</h2>\n        </header>\n        {loading ? (\n          <div className=\"state-msg\">불러오는 중...</div>\n        ) : visible.length === 0 ? (\n          <div className=\"state-msg\">등록된 FAQ가 없습니다.</div>\n        ) : (\n          <ul className=\"faq-list\">\n            {visible.map(f => {\n              const isOpen = openId === f.id;\n              return (\n                <li key={f.id} className={`faq-item ${isOpen ? 'is-open' : ''}`}>\n                  <button className=\"faq-q\" onClick={() => handleToggle(f.id)} aria-expanded={isOpen}>\n                    <span className=\"faq-q-cat\">{f.카테고리}</span>\n                    <span className=\"faq-q-text\">{f.질문}</span>\n                    <span className=\"faq-q-icon\">{isOpen ? '−' : '+'}</span>\n                  </button>\n                  {isOpen && <div className=\"faq-a\">{f.답변}</div>}\n                </li>\n              );\n            })}\n          </ul>\n        )}\n        <div className=\"section-foot\">\n          <a href=\"/faq\" className=\"link-more\">전체 FAQ 보기 →</a>\n        </div>\n      </div>\n    </section>\n  );\n}\n\nfunction CTASection() {\n  return (\n    <section className=\"cta\">\n      <div className=\"cta-inner\">\n        <h2 className=\"cta-title\">오늘부터 통역사와 함께<br/>영어 습관을 만들어보세요.</h2>\n        <p className=\"cta-desc\">신청 후 24시간 내에 김다빈 통역사가 직접 안내드려요.</p>\n        <a href=\"/apply\" className=\"btn btn-primary btn-lg\">신청 폼으로 이동</a>\n      </div>\n    </section>\n  );\n}\n\nfunction App() {\n  return (\n    <div className=\"app\">\n      <Nav active=\"home\" />\n      <main>\n        <Hero />\n        <ClassesGrid />\n        <BestReviews />\n        <FaqPreview />\n        <CTASec
